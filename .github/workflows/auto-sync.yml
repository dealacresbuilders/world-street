name: Auto Sync to project repos

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

     # Mukesh Frontend Repo
      - name: Sync to Mukesh Frontend Repo
        continue-on-error: true
        run: |
          git remote remove mukeshprojects || true
          git remote add mukeshprojects https://x-access-token:${{ secrets.MUKESH_PROJECTS_ACCESS_TOKEN }}@github.com/mukeshkumar44/world-street-in-faridabad-frontend.git
          git push mukeshprojects HEAD:main --force

      # Faridabad Dev Repo
      - name: Sync to Faridabad Dev Repo
        continue-on-error: true
        run: |
          git remote remove faridabaddev || true
          git remote add faridabaddev https://x-access-token:${{ secrets.FARIDABAD_ACESS_TOKEN }}@github.com/dealacresfaridabad/world-street.git
          git push faridabaddev HEAD:main --force
      

      